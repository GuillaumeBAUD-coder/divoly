services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: echoai
      POSTGRES_PASSWORD: echoai
      POSTGRES_DB: echoai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echoai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
